  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="site-header">
  <nav class="navbar">

    <!-- Logo -->
    <div class="nav-logo">
      <a href="index.html">
        <img src="images/logo-mentallia-blanc.png" alt="Mentallia" class="logo-navbar">
      </a>
    </div>

    <!-- Navigation -->
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="bilan.html">Bilan Mental Express</a></li>
      <li><a href="prestations.html">Prestations</a></li>
      <li><a href="outils.html" class="active">Outils</a></li>
      <li><a href="avis.html">On parle de Mentallia</a></li>
      <li><a href="apropos.html">À propos</a></li>
    </ul>

    <!-- Burger -->
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  </nav>
</header>

<section class="outils-premium">

  <!-- HERO -->
  <div class="outils-hero">
    <h1>Outils Mentallia</h1>
    <p>
      Des ressources gratuites pour développer votre force mentale,
      progresser sereinement et retrouver du plaisir dans votre pratique.
    </p>
  </div>

  <!-- CONTENEUR DYNAMIQUE -->
  <div id="outils-container"></div>

</section>

<script>

const outilsData = [

  {
    categorie: "🫁 Respirer & Se calmer",
    outils: [

      {
  icon: "🎧",
  titre: "Cohérence cardiaque",
  description: "Un audio guidé pour retrouver calme et concentration en quelques minutes.",
  audio: audio/Cob fm_part2.mp3
},
<audio controls>
          <source src="audio/Cob fm_part2.mp3" type="audio/mpeg">
          Ton navigateur ne supporte pas l’audio.
          </audio>
      
      {
        icon: "🌿",
        titre: "Respiration anti-stress",
        description: "Un exercice rapide pour faire redescendre la pression avant une échéance.",
        bouton: "Découvrir",
        lien: "respiration.html"
      },

      {
        icon: "😌",
        titre: "Relaxation rapide",
        description: "Une courte séance pour relâcher les tensions et récupérer mentalement.",
        bouton: "Utiliser",
        lien: "#"
      }

    ]
  },

  {
    categorie: "🎯 Motivation & Plaisir",
    outils: [

      {
        icon: "🎯",
        titre: "Cible du plaisir",
        description: "Évaluez votre niveau de plaisir dans votre pratique en un clic.",
        bouton: "Utiliser",
        lien: "cible-plaisir.html"
      },

      {
        icon: "🔥",
        titre: "Exercice motivation",
        description: "Retrouvez votre énergie et renforcez votre engagement.",
        bouton: "Découvrir",
        lien: "motivation.html"
      },

      {
        icon: "🏆",
        titre: "Objectifs personnels",
        description: "Clarifiez vos objectifs et avancez avec plus de sens.",
        bouton: "Commencer",
        lien: "#"
      }

    ]
  },

  {
    categorie: "🧠 Concentration & Confiance",
    outils: [

      {
        icon: "👁️",
        titre: "Visualisation mentale",
        description: "Préparez vos performances grâce à un audio guidé.",
        bouton: "Écouter",
        lien: "visualisation.html"
      },

      {
        icon: "📄",
        titre: "Fiche confiance",
        description: "Un support pratique à télécharger pour renforcer votre confiance.",
        bouton: "Télécharger",
        lien: "docs/confiance.pdf"
      },

      {
        icon: "⚡",
        titre: "Routine concentration",
        description: "Créez une routine simple pour mieux vous focaliser.",
        bouton: "Découvrir",
        lien: "#"
      }

    ]
  }

];

const container = document.getElementById('outils-container');

outilsData.forEach(categorie => {

  const bloc = document.createElement('div');
  bloc.className = 'categorie-bloc';

  let outilsHTML = '';

  categorie.outils.forEach(outil => {

    outilsHTML += `
      <div class="outil-card">

        <div class="outil-visuel">
          ${outil.icon}
        </div>

        <h3>${outil.titre}</h3>

        <p>${outil.description}</p>

        <a href="${outil.lien}" class="btn-outil">
          ${outil.bouton}
        </a>

      </div>
    `;
  });

  bloc.innerHTML = `
    <h2 class="ruban-categorie">
      ${categorie.categorie}
    </h2>

    <div class="outils-grid">
      ${outilsHTML}
    </div>
  `;

  container.appendChild(bloc);

});

function toggleMenu() {
  document.querySelector('.nav-links').classList.toggle('active');
}

</script>

</body>
</html>
